connectors:
  PWR:
    type: Power Button
    pinlabels: [WHITE, BLACK, GREEN, YELLOW, RED]
  WAGO2:
    type: Wago No 2
    pinlabels: [ONE, TWO]
  WAGO3:
    type: Wago No 3
    pinlabels: [ONE, TWO, THREE]
  DCDC:
    type: DC to DC converter
    pinlabels: [GNDIN, 12VIN, GNDOUT, 5VOUT]
  MOTORDRIVER:
    type: Motor Driver
    pinlabels: [12V, GND, 5V, OUT1, OUT2, OUT3, OUT4]

cables:
  BRAID3:
    wirecount: 2
    colors: [BK, RD]
    type: Braid Wrapped
  SUPPLYMOTORDRIVER:
    wirecount: 2
    colors: [BK, RD]
    type: Jumper Wire

connections:
  -
    - PWR: [1, 2]
    - -->
    - WAGO2: [1, 1]
  - 
    - PWR: [5]
    - -->
    - WAGO3: [1]
  -
    - WAGO3: [2]
    - BRAID3: [1]
    - DCDC: [1]
  -
    - WAGO2: [2]
    - BRAID3: [2]
    - DCDC: [2]
  -
    - DCDC: [1,2]
    - SUPPLYMOTORDRIVER: [1,2]
    - MOTORDRIVER: [1,2]