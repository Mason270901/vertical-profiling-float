connectors:
  X1:
    type: D-Sub
    subtype: female
    pinlabels: [DCD, RX, TX, DTR, GND, DSR, RTS, CTS, RI]
  X2:
    type: Molex KK 254
    subtype: female
    pinlabels: [GND, RX, TX]
  PWR:
    type: Power Button
    pinlabels: [WHITE, BLACK, GREEN, YELLOW, RED]
  WAGO2:
    type: Wago No 2
    pinlabels: [ONE, TWO]
  WAGO3:
    type: Wago No 3
    pinlabels: [ONE, TWO, THREE]
  DCDC:
    type: DC to DC converter
    pinlabels: [GNDIN, 12VIN, GNDOUT, 5VOUT]

cables:
  W1:
    gauge: 0.25 mm2
    length: 0.2
    color_code: DIN
    wirecount: 3
    shield: true
  BRAID3:
    wirecount: 2
    colors: [BK, RD]

connections:
  -
    - X1: [5,2,3]
    - W1: [1,2,3]
    - X2: [1,3,2]
  -
    - X1: 5
    - W1: s
  -
    - PWR: [1, 2]
    - <-->
    - WAGO2: [1, 1]
  - 
    - PWR: [5]
    - <-->
    - WAGO3: [1]
  -
    - WAGO3: [2]
    - BRAID3: [1]
    - DCDC: [1]
  -
    - WAGO2: [2]
    - BRAID3: [2]
    - DCDC: [2]