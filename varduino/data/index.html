<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vertical Profiling Float</title>
  <script src="/d3.min.js"></script>
  <style>
    :root {
      --bg:       #0f1117;
      --surface:  #1c1f2e;
      --border:   #2e3250;
      --accent:   #4f8ef7;
      --green:    #22c55e;
      --red:      #ef4444;
      --yellow:   #f59e0b;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --bar-fill: #4f8ef7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    header h1 { font-size: 1.6rem; letter-spacing: .03em; }
    header p  { color: var(--muted); font-size: .85rem; margin-top: .3rem; }

    /* ── Cards ─────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.4rem 1.6rem;
      margin: 0 auto 1.5rem;
      max-width: 640px;
    }
    .card h2 { font-size: 1rem; color: var(--muted); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: .06em; }

    /* ── LED panel ──────────────────────────────────────────── */
    .led-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .led-indicator {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--muted);
      box-shadow: 0 0 0 3px rgba(100,116,139,.2);
      flex-shrink: 0;
      transition: background .3s, box-shadow .3s;
    }
    .led-indicator.on  { background: var(--green);  box-shadow: 0 0 10px var(--green); }
    .led-indicator.off { background: var(--red);    box-shadow: 0 0 8px var(--red); }
    .led-label { font-size: .95rem; min-width: 60px; }
    .btn-group { display: flex; gap: .6rem; margin-left: auto; flex-wrap: wrap; }
    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: .5rem 1.1rem;
      font-size: .9rem;
      font-weight: 600;
      transition: opacity .15s, transform .1s;
    }
    button:active { transform: scale(.96); }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .btn-on  { background: var(--green); color: #fff; }
    .btn-off { background: var(--red);   color: #fff; }
    .btn-fetch { background: var(--accent); color: #fff; }

    /* ── Number input ──────────────────────────────────────────── */
    input[type=number] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: .9rem;
      padding: .45rem .8rem;
      width: 110px;
      outline: none;
    }
    input[type=number]:focus { border-color: var(--accent); }

    /* ── Toast ──────────────────────────────────────────────── */
    #toast {
      display: none;
      font-size: .82rem;
      color: var(--yellow);
      margin-top: .7rem;
    }

    /* ── Data panel ─────────────────────────────────────────── */
    .data-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: .6rem;
    }
    #data-meta { font-size: .8rem; color: var(--muted); }

    /* D3 chart container */
    #chart {
      width: 100%;
      margin-bottom: 1.2rem;
    }
    #chart svg { display: block; overflow: visible; }
    #chart .tick line,
    #chart .domain     { stroke: #2e3250; }
    #chart .tick text  { fill: #64748b; font-size: 10px; font-family: 'Segoe UI', system-ui, sans-serif; }
    #chart .line-path  { fill: none; stroke-width: 2px; stroke-linejoin: round; stroke-linecap: round; }
    #chart .area-path  { fill: url(#areaGradient); }
    #chart .dot        { fill: #000; stroke: rgba(0,0,0,0.3); stroke-width: 1px; }
    #chart .dot.hidden  { display: none; }
    .btn-toggle { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
    .btn-toggle.active { color: var(--text); border-color: var(--text); }
    #d3-tooltip {
      position: fixed;
      background: #334155;
      color: #e2e8f0;
      font-size: .72rem;
      padding: 4px 9px;
      border-radius: 5px;
      pointer-events: none;
      opacity: 0;
      transition: opacity .12s;
      white-space: nowrap;
      z-index: 100;
      border: 1px solid #4f8ef7;
    }

  </style>
</head>
<body>

<header>
  <h1>Vertical Profiling Float</h1>
  <p>ESP32 web interface &mdash; AJAX control</p>
</header>

<!-- LED Control Card -->
<div class="card">
  <h2>LED Control</h2>
  <div class="led-row">
    <div class="led-indicator" id="led-dot"></div>
    <span class="led-label" id="led-label">Unknown</span>
    <div class="btn-group">
      <button class="btn-on"  id="btn-on"  onclick="setLed('on')">Turn ON</button>
      <button class="btn-off" id="btn-off" onclick="setLed('off')">Turn OFF</button>
    </div>
  </div>
  <div id="toast"></div>
</div>

<!-- CC Setpoint Card -->
<div class="card">
  <h2>CC Setpoint</h2>
  <div class="led-row">
    <label for="sp-input" style="color:var(--muted);font-size:.9rem;">Volume (cc)</label>
    <input type="number" id="sp-input" min="0" max="300" step="1" placeholder="e.g. 50">
    <div class="btn-group" style="margin-left:auto">
      <button class="btn-fetch" id="btn-setpoint" onclick="setSetpoint()">Set</button>
    </div>
  </div>
  <div id="sp-toast" style="display:none;font-size:.82rem;margin-top:.7rem;"></div>
</div>

<!-- Profile FSM Card -->
<div class="card">
  <h2>Profile FSM</h2>
  <div class="led-row">
    <div class="led-indicator off" id="fsm-dot"></div>
    <span class="led-label" id="fsm-label">Disabled</span>
    <div class="btn-group">
      <button class="btn-on"  id="btn-fsm-enable"  onclick="setFSM('enable')">Enable</button>
      <button class="btn-off" id="btn-fsm-disable" onclick="setFSM('disable')">Disable</button>
    </div>
  </div>
  <div id="fsm-toast" style="display:none;font-size:.82rem;margin-top:.7rem;"></div>
</div>

<!-- Status Card -->
<div class="card">
  <h2>System Status</h2>
  <div id="status-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem .8rem;font-size:.88rem;">
    <span style="color:var(--muted)">Depth</span>    <span id="st-depth">—</span>
    <span style="color:var(--muted)">Profile</span>  <span id="st-profile">—</span>
    <span style="color:var(--muted)">FSM</span>      <span id="st-fsm">—</span>
    <span style="color:var(--muted)">Syringe CC</span>  <span id="st-cc">—</span>
    <span style="color:var(--muted)">Setpoint</span> <span id="st-sp">—</span>
    <span style="color:var(--muted)">Motor</span>    <span id="st-motor">—</span>
  </div>
  <div id="status-err" style="display:none;font-size:.8rem;margin-top:.5rem;color:var(--red)"></div>
</div>

<!-- Sensor Data Card -->
<div class="card">
  <div class="data-header">
    <h2 style="margin-bottom:0">Sensor Data</h2>
    <span id="data-meta"></span>
    <button class="btn-toggle" id="btn-toggle" onclick="togglePoints()" disabled>&#x25CF; Points</button>
    <button class="btn-fetch" id="btn-fetch" onclick="fetchData()">&#x21BB; Fetch Data</button>
  </div>
  <div id="chart"></div>
</div>

<script>
  // ── CC Setpoint ──────────────────────────────────────────────
  async function setSetpoint() {
    const input = document.getElementById('sp-input');
    const btn   = document.getElementById('btn-setpoint');
    const toast = document.getElementById('sp-toast');
    const val   = parseInt(input.value, 10);

    if (isNaN(val) || input.value.trim() === '') {
      toast.style.display = 'block';
      toast.style.color   = 'var(--red)';
      toast.textContent   = 'Enter a numeric value first.';
      return;
    }

    btn.disabled = true;
    toast.style.display = 'none';
    try {
      const res  = await fetch('/setpoint?v=' + val);
      const json = await res.json();
      toast.style.display = 'block';
      toast.style.color   = 'var(--green)';
      toast.textContent   = 'Setpoint set to ' + json.setpoint + ' cc';
    } catch (e) {
      toast.style.display = 'block';
      toast.style.color   = 'var(--red)';
      toast.textContent   = 'Request failed: ' + e.message;
    } finally {
      btn.disabled = false;
    }
  }

  // ── Profile FSM control ─────────────────────────────────────
  async function setFSM(action) {
    const endpoint = action === 'enable' ? '/enableFSM' : '/disableFSM';
    const btnEnable  = document.getElementById('btn-fsm-enable');
    const btnDisable = document.getElementById('btn-fsm-disable');
    btnEnable.disabled = btnDisable.disabled = true;
    const toast = document.getElementById('fsm-toast');
    toast.style.display = 'none';
    try {
      const res  = await fetch(endpoint);
      const json = await res.json();
      applyFSMState(json.fsm);
      toast.style.display = 'block';
      toast.style.color   = 'var(--green)';
      toast.textContent   = 'FSM is now ' + json.fsm;
    } catch (e) {
      toast.style.display = 'block';
      toast.style.color   = 'var(--red)';
      toast.textContent   = 'Request failed: ' + e.message;
    } finally {
      btnEnable.disabled = btnDisable.disabled = false;
    }
  }

  function applyFSMState(state) {
    const dot   = document.getElementById('fsm-dot');
    const label = document.getElementById('fsm-label');
    dot.className = 'led-indicator ' + (state === 'enabled' ? 'on' : 'off');
    label.textContent = state.charAt(0).toUpperCase() + state.slice(1);
  }

  // ── LED control ────────────────────────────────────────────
  async function setLed(state) {
    const endpoint = state === 'on' ? '/H' : '/L';
    const btnOn  = document.getElementById('btn-on');
    const btnOff = document.getElementById('btn-off');
    btnOn.disabled = btnOff.disabled = true;
    showToast('');

    try {
      const res  = await fetch(endpoint);
      const json = await res.json();
      applyLedState(json.led);
      showToast('OK \u2014 LED is ' + json.led.toUpperCase(), false);
    } catch (e) {
      showToast('Request failed: ' + e.message, true);
    } finally {
      btnOn.disabled = btnOff.disabled = false;
    }
  }

  function applyLedState(state) {
    const dot   = document.getElementById('led-dot');
    const label = document.getElementById('led-label');
    dot.className = 'led-indicator ' + state;
    label.textContent = state.toUpperCase();
  }

  function showToast(msg, isErr) {
    const t = document.getElementById('toast');
    t.style.display = msg ? 'block' : 'none';
    t.style.color = isErr ? 'var(--red)' : 'var(--green)';
    t.textContent = msg;
  }

  function togglePoints() {
    const btn  = document.getElementById('btn-toggle');
    const dots = document.querySelectorAll('#chart .dot');
    const show = btn.classList.toggle('active');
    dots.forEach(d => d.classList.toggle('hidden', !show));
  }

  // ── Status poll ────────────────────────────────────────────
  const PROFILE_COLORS = {
    WAITING:   'var(--muted)',
    DIVING:    'var(--accent)',
    STABILIZE: 'var(--yellow)',
    CLIMB:     '#a78bfa',
    SURFACE:   'var(--green)',
    FINISHED:  'var(--green)',
  };

  async function fetchStatus() {
    try {
      const res  = await fetch('/status');
      const json = await res.json();
      const s = json.syringe;

      document.getElementById('st-depth').textContent = json.depth.toFixed(2) + ' m';

      const profileEl = document.getElementById('st-profile');
      profileEl.textContent = json.profile;
      profileEl.style.color = PROFILE_COLORS[json.profile] || 'var(--text)';

      const fsmEl = document.getElementById('st-fsm');
      fsmEl.textContent = json.fsm;
      fsmEl.style.color = json.fsm === 'enabled' ? 'var(--green)' : 'var(--red)';

      document.getElementById('st-cc').textContent    = s.cc    + ' cc';
      document.getElementById('st-sp').textContent    = s.setpoint + ' cc';
      const motorEl = document.getElementById('st-motor');
      motorEl.textContent = s.motor;
      motorEl.style.color = s.motor === 'stopped' ? 'var(--muted)'
                           : s.motor === 'running-in' ? 'var(--accent)' : 'var(--red)';

      document.getElementById('status-err').style.display = 'none';
    } catch (e) {
      const err = document.getElementById('status-err');
      err.style.display = 'block';
      err.textContent = 'Status error: ' + e.message;
    }
  }

  fetchStatus();
  setInterval(fetchStatus, 2000);

  // ── Data fetch ─────────────────────────────────────────────
  async function fetchData() {
    const btn = document.getElementById('btn-fetch');
    btn.disabled = true;
    btn.textContent = 'Loading\u2026';

    try {
      const res  = await fetch('/data');
      const json = await res.json();
      renderData(json.data);
      const tb = document.getElementById('btn-toggle');
      tb.disabled = false;
      tb.classList.remove('active');
    } catch (e) {
      document.getElementById('data-meta').textContent = 'Error: ' + e.message;
    } finally {
      btn.disabled = false;
      btn.textContent = '\u21BB Fetch Data';
    }
  }

  function renderData(arr) {
    if (!arr || !arr.length) return;

    const meta   = document.getElementById('data-meta');
    const depths = arr.map(d => d[0]);
    const min    = Math.min(...depths);
    const max    = Math.max(...depths);
    const avg    = (depths.reduce((a,b)=>a+b,0) / depths.length).toFixed(2);
    meta.textContent = arr.length + ' samples \u2014 min ' + min.toFixed(2) + ' m  max ' + max.toFixed(2) + ' m  avg ' + avg + ' m';

    // D3 line chart
    const container = document.getElementById('chart');
    container.innerHTML = '';

    const margin = { top: 16, right: 16, bottom: 28, left: 58 };
    const totalW  = container.clientWidth  || 580;
    const totalH  = 220;
    const w = totalW  - margin.left - margin.right;
    const h = totalH  - margin.top  - margin.bottom;

    const svgRoot = d3.select('#chart')
      .append('svg')
        .attr('width', '100%')
        .attr('viewBox', `0 0 ${totalW} ${totalH}`);

    // Gradient def for area fill
    const defs = svgRoot.append('defs');
    const grad = defs.append('linearGradient')
      .attr('id', 'areaGradient')
      .attr('x1', '0').attr('y1', '0')
      .attr('x2', '0').attr('y2', '1');
    grad.append('stop').attr('offset', '0%')  .attr('stop-color', '#4f8ef7').attr('stop-opacity', 0.35);
    grad.append('stop').attr('offset', '100%').attr('stop-color', '#4f8ef7').attr('stop-opacity', 0.02);

    const svg = svgRoot.append('g')
      .attr('transform', `translate(${margin.left},${margin.top})`);

    const xScale = d3.scaleLinear()
      .domain([0, (arr.length - 1) * 4])
      .range([0, w]);

    const yScale = d3.scaleLinear()
      .domain([min - (max - min) * 0.08, max + (max - min) * 0.05])
      .nice()
      .range([h, 0]);

    // IRONBOW thermal palette — 433 entries, low y → cool/dark, high y → hot/bright
    const ironbow = ('00000a,000014,00001e,000025,00002a,00002e,000032,000036,00003a,00003e,000042,000046,00004a,00004f,000052,010055,010057,020059,02005c,03005e,040061,040063,050065,060067,070069,08006b,09006e,0a0070,0b0073,0c0074,0d0075,0d0076,0e0077,100078,120079,13007b,15007c,17007d,19007e,1b0080,1c0081,1e0083,200084,220085,240086,260087,280089,2a0089,2c008a,2e008b,30008c,32008d,34008e,36008e,38008f,390090,3b0091,3c0092,3e0093,3f0093,410094,420095,440095,450096,470096,490096,4a0096,4c0097,4e0097,4f0097,510097,520098,540098,560098,580099,5a0099,5c0099,5d009a,5f009a,61009b,63009b,64009b,66009b,68009b,6a009b,6c009c,6d009c,6f009c,70009c,71009d,73009d,75009d,77009d,78009d,7a009d,7c009d,7e009d,7f009d,81009d,83009d,84009d,86009d,87009d,89009d,8a009d,8b009d,8d009d,8f009c,91009c,93009c,95009c,96009b,98009b,99009b,9b009b,9c009b,9d009b,9f009b,a0009b,a2009b,a3009b,a4009b,a6009a,a7009a,a8009a,a90099,aa0099,ab0099,ad0099,ae0198,af0198,b00198,b00198,b10197,b20197,b30196,b40296,b50295,b60295,b70395,b80395,b90495,ba0495,ba0494,bb0593,bc0593,bd0593,be0692,bf0692,bf0692,c00791,c00791,c10890,c10990,c20a8f,c30a8e,c30b8e,c40c8d,c50c8c,c60d8b,c60e8a,c70f89,c81088,c91187,ca1286,ca1385,cb1385,cb1484,cc1582,cd1681,ce1780,ce187e,cf187c,cf197b,d01a79,d11b78,d11c76,d21c75,d21d74,d31e72,d32071,d4216f,d4226e,d5236b,d52469,d62567,d72665,d82764,d82862,d92a60,da2b5e,da2c5c,db2e5a,db2f57,dc2f54,dd3051,dd314e,de324a,de3347,df3444,df3541,df363d,e0373a,e03837,e03933,e13a30,e23b2d,e23c2a,e33d26,e33e23,e43f20,e4411d,e4421c,e5431b,e54419,e54518,e64616,e74715,e74814,e74913,e84a12,e84c10,e84c0f,e94d0e,e94d0d,ea4e0c,ea4f0c,eb500b,eb510a,eb520a,eb5309,ec5409,ec5608,ec5708,ec5808,ed5907,ed5a07,ed5b06,ee5c06,ee5c05,ee5d05,ee5e05,ef5f04,ef6004,ef6104,ef6204,f06303,f06403,f06503,f16603,f16603,f16703,f16803,f16902,f16a02,f16b02,f16b02,f26c01,f26d01,f26e01,f36f01,f37001,f37101,f37201,f47300,f47400,f47500,f47600,f47700,f47800,f47a00,f57b00,f57c00,f57e00,f57f00,f68000,f68100,f68200,f78300,f78400,f78500,f78600,f88700,f88800,f88800,f88900,f88a00,f88b00,f88c00,f98d00,f98d00,f98e00,f98f00,f99000,f99100,f99200,f99300,fa9400,fa9500,fa9600,fb9800,fb9900,fb9a00,fb9c00,fc9d00,fc9f00,fca000,fca100,fda200,fda300,fda400,fda600,fda700,fda800,fdaa00,fdab00,fdac00,fdad00,fdae00,feaf00,feb000,feb100,feb200,feb300,feb400,feb500,feb600,feb800,feb900,feb900,feba00,febb00,febc00,febd00,febe00,fec000,fec100,fec200,fec300,fec400,fec500,fec600,fec700,fec800,fec901,feca01,feca01,fecb01,fecc02,fecd02,fece03,fecf04,fecf04,fed005,fed106,fed308,fed409,fed50a,fed60a,fed70b,fed80c,fed90d,ffda0e,ffda0e,ffdb10,ffdc12,ffdc14,ffdd16,ffde19,ffde1b,ffdf1e,ffe020,ffe122,ffe224,ffe226,ffe328,ffe42b,ffe42e,ffe531,ffe635,ffe638,ffe73c,ffe83f,ffe943,ffea46,ffeb49,ffeb4d,ffec50,ffed54,ffee57,ffee5b,ffee5f,ffef63,ffef67,fff06a,fff06e,fff172,fff177,fff17b,fff280,fff285,fff28a,fff38e,fff492,fff496,fff49a,fff59e,fff5a2,fff5a6,fff6aa,fff6af,fff7b3,fff7b6,fff8ba,fff8bd,fff8c1,fff8c4,fff9c7,fff9ca,fff9cd,fffad1,fffad4,fffbd8,fffcdb,fffcdf,fffde2,fffde5,fffde8,fffeeb,fffeee,fffef1,fffef4,fffff6').split(',');
    const lineGrad = defs.append('linearGradient')
      .attr('id', 'lineGradient')
      .attr('gradientUnits', 'userSpaceOnUse')
      .attr('x1', 0).attr('x2', 0)
      .attr('y1', yScale(min)).attr('y2', yScale(max));
    ironbow.forEach((hex, i) => {
      lineGrad.append('stop')
        .attr('offset', (i / (ironbow.length - 1) * 100).toFixed(2) + '%')
        .attr('stop-color', '#' + hex);
    });

    // Grid lines
    svg.append('g')
      .attr('class', 'grid')
      .call(d3.axisLeft(yScale).ticks(5).tickSize(-w).tickFormat(''))
      .selectAll('line').style('stroke', '#2e3250').style('stroke-dasharray', '3,3');
    svg.select('.grid .domain').remove();

    // X axis — tick every 32 seconds (8 samples × 4 s)
    svg.append('g')
      .attr('transform', `translate(0,${h})`)
      .call(
        d3.axisBottom(xScale)
          .tickValues(d3.range(0, arr.length * 4, 32))
          .tickFormat(d => '+' + d + 's')
      );

    // Y axis
    svg.append('g')
      .call(d3.axisLeft(yScale).ticks(5).tickFormat(d3.format('.1f')));

    // Y axis label
    svg.append('text')
      .attr('transform', 'rotate(-90)')
      .attr('x', -h / 2).attr('y', -46)
      .attr('text-anchor', 'middle')
      .style('fill', '#64748b').style('font-size', '10px')
      .text('Depth (m)');

    // Area
    const areaGen = d3.area()
      .x((_, i) => xScale(i * 4))
      .y0(h)
      .y1(d => yScale(d));

    svg.append('path')
      .datum(depths)
      .attr('class', 'area-path')
      .attr('d', areaGen);

    // Line
    const lineGen = d3.line()
      .x((_, i) => xScale(i * 4))
      .y(d => yScale(d));

    svg.append('path')
      .datum(depths)
      .attr('class', 'line-path')
      .style('stroke', 'url(#lineGradient)')
      .attr('d', lineGen);

    // Dots + tooltip
    const tip = d3.select('#d3-tooltip');

    svg.selectAll('.dot')
      .data(arr)
      .join('circle')
        .attr('class', 'dot hidden')
        .attr('cx', (_, i) => xScale(i * 4))
        .attr('cy', d => yScale(d[0]))
        .attr('r', 3)
        .on('mousemove', function(event, d) {
          const i = arr.indexOf(d);
          const t = i * 4;
          tip.style('opacity', 1)
             .html('<strong>+' + t + 's</strong> &nbsp;' + d[0].toFixed(2) + ' m')
             .style('left',  (event.clientX + 14) + 'px')
             .style('top',   (event.clientY - 28) + 'px');
        })
        .on('mouseleave', () => tip.style('opacity', 0));

    // Populate entry log
    const logList = document.getElementById('log-list');
    logList.innerHTML = '';
    arr.forEach((d, i) => {
      const t     = i * 4;
      const kpa   = (d[1] / 10).toFixed(1);
      const depth = d[0].toFixed(2);
      const li    = document.createElement('li');
      li.textContent = 'RN02  +' + t + ' seconds  ' + kpa + ' kpa  ' + depth + ' meters';
      logList.appendChild(li);
    });
  }
</script>

<!-- Entry Log Card -->
<div class="card">
  <h2>Entry Log</h2>
  <ul id="log-list" style="list-style:none;font-size:.82rem;font-family:monospace;color:var(--muted);line-height:1.8;"></ul>
</div>

<div id="d3-tooltip"></div>
</body>
</html>
